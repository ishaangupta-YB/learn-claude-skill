<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Solid-Geometry Lesson</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous" />
<style>
  :root { --bg:#0f1226; --panel:#181c3a; --ink:#eef1ff; --muted:#9aa3d4; --accent:#6ee7ff; --hi:#ffd166; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--ink); }
  header { padding:18px 24px; border-bottom:1px solid #2a2f5a; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:6px 0 0; color:var(--muted); }
  .wrap { display:grid; grid-template-columns: 1fr 380px; gap:0; height:calc(100vh - 78px); }
  #scene { position:relative; }
  canvas { display:block; }
  .side { background:var(--panel); border-left:1px solid #2a2f5a; overflow-y:auto; padding:18px 20px; }
  .answer { background:#11254a; border:1px solid #2a4d8f; border-radius:12px; padding:14px 16px; margin-bottom:16px; }
  .answer .label { color:var(--accent); font-size:13px; text-transform:uppercase; letter-spacing:.06em; }
  .step { border:1px solid #2a2f5a; border-radius:12px; padding:12px 14px; margin-bottom:10px; cursor:pointer; transition:.15s; }
  .step:hover, .step.active { border-color:var(--accent); background:#101842; }
  .step h3 { margin:0 0 6px; font-size:14px; color:var(--accent); }
  .step .body { color:var(--ink); font-size:14px; line-height:1.5; }
  .controls { margin-top:10px; display:flex; gap:8px; }
  button { background:#23306a; color:var(--ink); border:1px solid #38468f; border-radius:8px; padding:8px 12px; cursor:pointer; }
  button:hover { background:#2c3c86; }
  .pill { display:inline-block; background:#23306a; color:var(--muted); border-radius:999px; padding:2px 10px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1 id="title"></h1>
  <p id="problem"></p>
</header>
<div class="wrap">
  <div id="scene"></div>
  <div class="side">
    <div class="answer">
      <div class="label" id="answer-label"></div>
      <div id="answer-latex" style="font-size:20px;margin-top:6px;"></div>
    </div>
    <div id="steps"></div>
    <div class="controls">
      <button id="prev">Prev</button>
      <button id="next">Next</button>
      <span class="pill" id="counter"></span>
    </div>
  </div>
</div>

<script id="lesson-data" type="application/json">__LESSON_DATA__</script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFG" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const lesson = JSON.parse(document.getElementById("lesson-data").textContent);
const m = lesson.model;

document.getElementById("title").textContent = lesson.title;
document.getElementById("problem").innerHTML = lesson.problemHtml;
document.getElementById("answer-label").innerHTML = lesson.answerLabel;
document.getElementById("answer-latex").textContent = "$$" + lesson.answerLatex + "$$";

// --- three.js scene ---
const host = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
host.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1226);
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
const cam = m.camera || [6,5,7];
camera.position.set(cam[0], cam[1], cam[2]);
const controls = new OrbitControls(camera, renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dir = new THREE.DirectionalLight(0xffffff, 0.6); dir.position.set(5,10,7); scene.add(dir);

const pts = m.points;
function v(name){ const p = pts[name]; return new THREE.Vector3(p[0], p[1], p[2]); }

// edges
const edgeMat = new THREE.LineBasicMaterial({ color:0x9aa3d4 });
for (const [a,b] of m.edges) {
  const g = new THREE.BufferGeometry().setFromPoints([v(a), v(b)]);
  scene.add(new THREE.Line(g, edgeMat));
}
// vertices + labels
const sphereGeo = new THREE.SphereGeometry(0.06, 16, 16);
const sphereMat = new THREE.MeshStandardMaterial({ color:0x6ee7ff });
for (const name of Object.keys(pts)) {
  const s = new THREE.Mesh(sphereGeo, sphereMat); s.position.copy(v(name)); scene.add(s);
  const cv = document.createElement("canvas"); cv.width=64; cv.height=64;
  const cx = cv.getContext("2d"); cx.fillStyle="#ffd166"; cx.font="48px sans-serif"; cx.fillText(name, 6, 48);
  const tex = new THREE.CanvasTexture(cv);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, depthTest:false }));
  spr.position.copy(v(name)).add(new THREE.Vector3(0.18,0.18,0));
  spr.scale.set(0.5,0.5,0.5); scene.add(spr);
}
// highlight line
if (m.line) {
  const g = new THREE.BufferGeometry().setFromPoints([v(m.line[0]), v(m.line[1])]);
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color:0xffd166, linewidth:3 })));
}
// highlight plane (triangle fan over the named points)
if (m.plane && m.plane.length >= 3) {
  const verts = m.plane.map(v);
  const geo = new THREE.BufferGeometry();
  const arr = [];
  for (let i=1;i<verts.length-1;i++){ arr.push(verts[0],verts[i],verts[i+1]); }
  geo.setFromPoints(arr);
  geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color:0x6ee7ff, transparent:true, opacity:0.25, side:THREE.DoubleSide })));
}

function resize(){
  const w = host.clientWidth, h = host.clientHeight;
  renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize); resize();
(function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();

// --- steps ---
const stepsEl = document.getElementById("steps");
lesson.steps.forEach((st, i) => {
  const d = document.createElement("div"); d.className="step"; d.dataset.i=i;
  d.innerHTML = `<h3>Step ${i+1}: ${st.title}</h3><div class="body">${st.html}</div>`;
  d.addEventListener("click", () => setStep(i));
  stepsEl.appendChild(d);
});
let cur = 0;
function setStep(i){
  cur = Math.max(0, Math.min(lesson.steps.length-1, i));
  [...stepsEl.children].forEach((c,idx)=>c.classList.toggle("active", idx===cur));
  document.getElementById("counter").textContent = `Step ${cur+1} / ${lesson.steps.length}`;
}
document.getElementById("prev").onclick = () => setStep(cur-1);
document.getElementById("next").onclick = () => setStep(cur+1);
setStep(0);

renderMathInElement(document.body, { delimiters:[
  {left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}
]});
</script>
</body>
</html>
